<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xem nội dung khóa học | Admin Preview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap"
          rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .video-container iframe,
        .video-container video {
            border-radius: 1.5rem;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }

        .lesson-card.active {
            border-color: #4f46e5;
            background-color: #f5f3ff;
        }
    </style>
</head>
<body class="bg-slate-50 p-4 md:p-8">
<div class="max-w-5xl mx-auto">

    <div class="flex justify-between items-center mb-6">
        <button onclick="window.close()"
                class="text-sm font-bold text-slate-400 hover:text-indigo-600 transition flex items-center">
            <span class="mr-2">←</span> Đóng trang xem trước
        </button>
        <div class="flex space-x-2">
            <span th:if="${course.status == 'PENDING'}"
                  class="bg-amber-100 text-amber-600 px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest border border-amber-200">
                ⏳ Đang chờ duyệt
            </span>
            <span th:if="${course.status == 'APPROVE'}"
                  class="bg-emerald-100 text-emerald-600 px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest border border-emerald-200">
                ✅ Đã xuất bản
            </span>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

        <div class="lg:col-span-2 space-y-6">
            <div class="video-container bg-slate-900 aspect-video rounded-[2rem] flex items-center justify-center overflow-hidden relative group">
                <iframe id="mainVideoPlayer"
                        class="w-full h-full hidden"
                        src=""
                        frameborder="0"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                        allowfullscreen>
                </iframe>
                <video id="mainVideoLocalPlayer"
                       class="w-full h-full hidden"
                       controls
                       playsinline
                       preload="metadata">
                </video>
                <div id="placeholder" class="text-center p-8">
                    <div class="text-6xl mb-4">🎬</div>
                    <p class="text-slate-400 font-bold uppercase tracking-tighter text-sm">Chọn một bài giảng để kiểm
                        tra nội dung</p>
                </div>
            </div>

            <div class="bg-white rounded-[2rem] p-8 shadow-sm border border-slate-100">
                <h1 class="text-3xl font-black text-slate-800 tracking-tight" th:text="${course.title}">Tiêu đề khóa
                    học</h1>
                <div class="flex items-center mt-3 text-slate-400 text-sm font-medium">
                    <span class="flex items-center"><span class="mr-2">👤</span> <span
                            th:text="${course.instructor.username}">Giảng viên</span></span>
                    <span class="mx-3">•</span>
                    <span th:text="${course.lessons.size() + ' bài giảng'}">0 bài giảng</span>
                </div>
                <div class="h-px bg-slate-100 my-6"></div>
                <p class="text-slate-500 leading-relaxed italic" th:text="${course.description}">Mô tả khóa học...</p>
            </div>
        </div>

        <div class="space-y-4">
            <h3 class="text-sm font-black text-slate-400 uppercase tracking-widest ml-2">Cấu trúc nội dung</h3>

            <div class="max-h-[70vh] overflow-y-auto pr-2 space-y-3 custom-scrollbar">
                <div th:each="lesson, stat : ${course.lessons}"
                     th:data-url="${lesson.videoUrl}"
                     onclick="playLesson(this)"
                     class="lesson-card bg-white p-5 rounded-2xl border border-slate-100 flex items-center space-x-4 cursor-pointer hover:shadow-md hover:border-indigo-300 transition-all group">

                    <div class="w-8 h-8 flex-shrink-0 bg-slate-50 rounded-lg flex items-center justify-center font-bold text-xs text-slate-400 group-hover:bg-indigo-600 group-hover:text-white transition-all"
                         th:text="${stat.count}">1
                    </div>

                    <div class="flex-1 overflow-hidden">
                        <h4 class="font-bold text-slate-700 text-sm truncate" th:text="${lesson.title}">Tên bài học</h4>
                        <p class="text-[10px] text-indigo-500 font-black uppercase mt-1 flex items-center">
                            <span class="mr-1">▶</span> PHÁT VIDEO
                        </p>
                    </div>
                </div>

                <div th:if="${#lists.isEmpty(course.lessons)}"
                     class="text-center py-10 bg-slate-100 rounded-[2rem] border-2 border-dashed border-slate-200">
                    <p class="text-xs text-slate-400 font-bold uppercase">Chưa có bài học</p>
                </div>
            </div>
        </div>
    </div>
    <div class="mt-8 bg-slate-50 rounded-3xl p-6 border-2 border-dashed border-slate-200">
        <h3 class="text-sm font-black text-slate-800 uppercase tracking-widest mb-4 flex items-center">
            <span class="mr-2">📝</span> Phản hồi cho giảng viên
        </h3>

        <form th:action="@{/admin/course/reject/{id}(id=${course.id})}" method="post">
    <textarea name="note" rows="4"
              class="w-full rounded-2xl border-none p-4 text-sm text-slate-600 focus:ring-2 focus:ring-indigo-500 shadow-inner mb-4"
              placeholder="Nhập lý do cần chỉnh sửa..." th:text="${course.note}"></textarea>

            <div class="flex space-x-4">
                <button type="submit"
                        class="flex-1 bg-amber-500 hover:bg-amber-600 text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-amber-200 text-[11px] uppercase tracking-wider">
                    ⚠️ Gửi yêu cầu chỉnh sửa
                </button>

                <button type="submit"
                        th:formaction="@{/admin/courses/approve/{id}(id=${course.id})}"
                        class="flex-1 bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-emerald-200 text-[11px] uppercase tracking-wider">
                    ✅ Duyệt khóa học này
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    function isLocalVideoUrl(videoSource) {
        if (!videoSource) return false;
        const value = videoSource.trim().toLowerCase();
        return value.startsWith('/uploads/') || value.startsWith('uploads/') || value.endsWith('.mp4') || value.endsWith('.webm');
    }

    function resolveLocalVideoUrl(videoSource) {
        const value = videoSource.trim().replace(/\\/g, '/');
        const lower = value.toLowerCase();

        if (lower.startsWith('http://') || lower.startsWith('https://') || value.startsWith('/')) {
            return value;
        }

        if (value.startsWith('uploads/')) {
            return '/' + value;
        }

        return '/uploads/videos/' + value;
    }

    function extractYoutubeId(videoSource) {
        if (!videoSource) return null;
        const value = videoSource.trim();

        if (/^[a-zA-Z0-9_-]{11}$/.test(value)) {
            return value;
        }

        const patterns = [
            /[?&]v=([^&#]{11})/,
            /youtu\.be\/([^?&#]{11})/,
            /youtube\.com\/embed\/([^?&#]{11})/,
            /youtube\.com\/shorts\/([^?&#]{11})/
        ];

        for (const pattern of patterns) {
            const match = value.match(pattern);
            if (match && match[1]) {
                return match[1];
            }
        }

        return null;
    }

    function playLesson(element) {
        const videoSource = element.getAttribute('data-url');
        const youtubePlayer = document.getElementById('mainVideoPlayer');
        const localPlayer = document.getElementById('mainVideoLocalPlayer');
        const placeholder = document.getElementById('placeholder');

        if (!videoSource || videoSource.trim() === "") {
            alert("Bài giảng này chưa có mã video!");
            return;
        }

        // 1. Highlight bài đang chọn (Thêm viền xanh cho đẹp)
        document.querySelectorAll('.lesson-card').forEach(el => el.classList.remove('active'));
        element.classList.add('active');

        if (isLocalVideoUrl(videoSource)) {
            youtubePlayer.src = "";
            youtubePlayer.classList.add('hidden');

            localPlayer.src = resolveLocalVideoUrl(videoSource);
            localPlayer.classList.remove('hidden');
            localPlayer.load();
            localPlayer.play().catch(() => {});
        } else {
            const embedId = extractYoutubeId(videoSource);
            if (!embedId) {
                alert("Không đọc được định dạng video hiện tại!");
                return;
            }

            localPlayer.pause();
            localPlayer.removeAttribute('src');
            localPlayer.load();
            localPlayer.classList.add('hidden');

            youtubePlayer.src = "https://www.youtube.com/embed/" + embedId + "?autoplay=1&rel=0&modestbranding=1";
            youtubePlayer.classList.remove('hidden');
        }

        // 3. Hiển thị trình phát và ẩn thông báo chờ
        placeholder.classList.add('hidden');

        // Cuộn màn hình lên đầu nếu đang xem trên điện thoại
        if (window.innerWidth < 1024) {
            window.scrollTo({top: 0, behavior: 'smooth'});
        }
    }
</script>

<style>
    /* Custom Scrollbar cho danh sách bài học */
    .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
        background: #f1f5f9;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
    }
</style>

</body>
</html>
